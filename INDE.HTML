<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: #fff;
    }

    header {
      background: #000;
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      color: #f4b400;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f4b400;
    }

    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 50px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .section {
      padding: 50px;
      text-align: center;
    }

    .menu-items {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      background: #000;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }

    button {
      padding: 10px 20px;
      background: #f4b400;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ffaa00;
    }
  </style>
</head>
<BODY>
<section class="section" id="menu">
  <h2>Our Menu</h2>
  <div class="menu-items">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
      <h3>Burger</h3>
      <p>Delicious juicy burger</p>
      </div>
     
     <div class="card">
      <img src="images/chad-montano-MqT0asuoIcU-unsplash.jpg">
      <h3>Pizza</h3>
      <p>Tasty cheese pizza</p>
      </div>


   
    <div class="card">
      <img src="images/joyce-panda-lpsbMRRqMQw-unsplash.jpg">
      <h3>Fries</h3>
      <p>Crispy golden fries</p>
    </div>

  </div>
</section>

</BODY>
</HTML>
